<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex flex-col items-center">
      <span class="text-primary font-bold text-4xl tracking-tight leading-none mb-1">AIMS</span>
      <span class="text-xs text-gray-500 font-medium uppercase tracking-widest">Digital Archive System</span>
    </div>
    <h2 class="mt-8 text-center text-2xl font-bold text-gray-900">
      Admin Login
    </h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-sm border border-gray-100 sm:rounded-3xl sm:px-10">
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        @if (errorMessage) {
          <div class="p-3 rounded-xl text-xs font-semibold text-danger bg-red-50 border border-red-100 flex items-center">
            <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Username or Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="email" [(ngModel)]="email" name="email" class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl text-sm focus:ring-primary focus:border-primary transition-colors bg-gray-50 focus:bg-white" placeholder="admin@aims.vn" required>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Password</label>
            <a href="#" class="text-xs font-medium text-primary hover:text-primary-hover">Forgot password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input type="password" [(ngModel)]="password" name="password" class="block w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:ring-primary focus:border-primary transition-colors bg-gray-50 focus:bg-white" placeholder="••••••••" required>
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-400 hover:text-gray-600">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </div>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading" class="w-full flex justify-center py-3.5 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-primary hover:bg-primary-hover hover:shadow-lg transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-55">
            {{ isLoading ? 'Authenticating...' : 'Log In' }}
          </button>
        </div>
      </form>

      <div class="mt-8 flex items-center justify-center space-x-2 text-xs font-medium text-success bg-green-50 p-2 rounded-lg">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
        <span>SECURE CONNECTION</span>
      </div>
    </div>
  </div>
</div>
