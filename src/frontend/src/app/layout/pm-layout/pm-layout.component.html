<div class="min-h-screen bg-gray-50 flex">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm flex-shrink-0">
    <!-- Brand -->
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <div class="flex flex-col">
        <span class="text-primary font-bold text-xl tracking-tight leading-none">AIMS Manager</span>
        <span class="text-[10px] text-gray-500 font-medium uppercase tracking-widest mt-1">Quản lý kho & đơn hàng</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-3 space-y-1">
      <a routerLink="/pm/orders" routerLinkActive="bg-blue-50 text-primary font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors group">
        <svg class="mr-3 flex-shrink-0 h-5 w-5 text-gray-400 group-hover:text-gray-500" [class.text-primary]="true" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
        Đơn hàng
      </a>
      
      <a routerLink="/pm/products" routerLinkActive="bg-blue-50 text-primary font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors group">
        <svg class="mr-3 flex-shrink-0 h-5 w-5 text-gray-400 group-hover:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
        Kho sản phẩm
      </a>

      <a routerLink="/pm/logs" routerLinkActive="bg-blue-50 text-primary font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors group">
        <svg class="mr-3 flex-shrink-0 h-5 w-5 text-gray-400 group-hover:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
        Nhật ký kho
      </a>
    </nav>
    
    <!-- User Footer -->
    <div class="p-4 border-t border-gray-200">
      <div class="flex items-center">
        <div class="h-8 w-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-xs flex-shrink-0">
          PM
        </div>
        <div class="ml-3">
          <p class="text-sm font-medium text-gray-900">Manager N.M.A</p>
          <a routerLink="/login" class="text-xs font-medium text-danger hover:text-red-700 transition-colors">Đăng xuất</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto w-full">
    <router-outlet></router-outlet>
  </main>
</div>
