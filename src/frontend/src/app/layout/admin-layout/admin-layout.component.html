<div class="min-h-screen bg-gray-50 flex">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm flex-shrink-0">
    <!-- Brand -->
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <div class="flex flex-col">
        <span class="text-primary font-bold text-xl tracking-tight leading-none">AIMS Admin</span>
        <span class="text-[10px] text-gray-500 font-medium uppercase tracking-widest mt-1">Digital Archive System</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-3 space-y-1">
      <a routerLink="/admin/users" routerLinkActive="bg-blue-50 text-primary font-semibold" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors group">
        <svg class="mr-3 flex-shrink-0 h-5 w-5 text-gray-400 group-hover:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        User Management
      </a>
    </nav>
  </aside>

  <!-- Main Workspace -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden" (click)="isProfileDropdownOpen = false">
    <!-- Top Header Navbar -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 flex-shrink-0 z-30 shadow-sm">
      <div class="flex items-center">
        <span class="text-xs font-extrabold text-gray-400 uppercase tracking-widest">Admin System</span>
      </div>
      
      <!-- Profile Area -->
      <div class="relative">
        <button 
          (click)="toggleProfileDropdown($event)"
          class="flex items-center space-x-3 hover:bg-gray-50 p-1.5 rounded-2xl transition-all cursor-pointer focus:outline-none border border-transparent hover:border-gray-100"
        >
          <div class="h-8 w-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-xs shadow-inner border border-primary/10">
            {{ currentUser?.fullName?.substring(0,2)?.toUpperCase() || 'AD' }}
          </div>
          <div class="hidden md:flex flex-col text-left">
            <span class="text-xs font-black text-gray-900 leading-none mb-1">{{ currentUser?.fullName }}</span>
            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none">ADMIN</span>
          </div>
          <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div 
          *ngIf="isProfileDropdownOpen"
          class="absolute right-0 mt-2 w-52 bg-white rounded-2xl border border-gray-100 shadow-xl py-2 z-40 animate-in fade-in slide-in-from-top-2 duration-150 text-left"
          (click)="$event.stopPropagation()"
        >
          <!-- Info Header -->
          <div class="px-4 py-2 border-b border-gray-100 mb-1">
            <p class="text-xs font-black text-gray-900 truncate">{{ currentUser?.fullName }}</p>
            <p class="text-[10px] text-gray-400 truncate mt-0.5">{{ currentUser?.email }}</p>
          </div>

          <!-- Options -->
          <button 
            (click)="openUserInfoModal($event)" 
            class="w-full text-left px-4 py-2 text-xs font-bold text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors flex items-center space-x-2 cursor-pointer focus:outline-none"
          >
            <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span>Profile</span>
          </button>

          <button 
            (click)="openChangePasswordModal($event)" 
            class="w-full text-left px-4 py-2 text-xs font-bold text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors flex items-center space-x-2 cursor-pointer focus:outline-none"
          >
            <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
            <span>Change Password</span>
          </button>

          <div class="border-t border-gray-100 my-1"></div>

          <button 
            (click)="logout($event)" 
            class="w-full text-left px-4 py-2 text-xs font-bold text-danger hover:bg-red-50 transition-colors flex items-center space-x-2 cursor-pointer focus:outline-none"
          >
            <svg class="w-4 h-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto w-full">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- MODAL: Thông tin cá nhân -->
  <div *ngIf="isUserInfoModalOpen" class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm transition-all duration-300">
    <div class="relative bg-white w-full max-w-sm rounded-3xl border border-gray-100 shadow-2xl p-6 text-center transform transition-all scale-100 animate-in fade-in zoom-in duration-200">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-50 text-primary border border-blue-100 mb-4 shadow-inner">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>

      <h3 class="text-base font-extrabold text-gray-900 mb-4 leading-none">Account Information</h3>

      <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-left space-y-2 mb-6">
        <p class="text-xs text-gray-500 font-semibold">Full Name: <span class="text-gray-900 font-bold">{{ currentUser?.fullName }}</span></p>
        <p class="text-xs text-gray-500 font-semibold">Email: <span class="text-gray-900 font-bold font-mono">{{ currentUser?.email }}</span></p>
        <p class="text-xs text-gray-500 font-semibold">Roles:
          <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-black bg-blue-50 text-primary border border-blue-100 uppercase ml-1" *ngFor="let role of currentUser?.roles">
            {{ role }}
          </span>
        </p>
      </div>

      <button
        (click)="closeUserInfoModal()"
        class="w-full py-3 rounded-2xl bg-gray-900 hover:bg-gray-800 text-white font-bold text-xs shadow-md transition-colors cursor-pointer"
      >
        Close
      </button>
    </div>
  </div>

  <!-- MODAL: Change Password -->
  <div *ngIf="isChangePasswordModalOpen" class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm transition-all duration-300">
    <div class="relative bg-white w-full max-w-sm rounded-3xl border border-gray-100 shadow-2xl p-6 transform transition-all scale-100 animate-in fade-in zoom-in duration-200">
      <div class="flex items-center justify-between border-b border-gray-100 pb-4 mb-4 text-left">
        <h3 class="text-base font-extrabold text-gray-900 leading-none">Change Password</h3>
        <button (click)="closeChangePasswordModal()" class="text-gray-400 hover:text-gray-600 hover:bg-gray-50 p-1.5 rounded-full transition-all cursor-pointer">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>

      <div class="space-y-4 mb-6 text-left">
        <div>
          <label class="block text-[10px] font-black uppercase text-gray-400 tracking-wider mb-2">Current Password</label>
          <input
            type="password"
            [(ngModel)]="oldPassword"
            class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder-gray-400 font-bold transition-all"
            placeholder="Enter current password..."
          />
        </div>
        <div>
          <label class="block text-[10px] font-black uppercase text-gray-400 tracking-wider mb-2">New Password (minimum 6 characters)</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder-gray-400 font-bold transition-all"
            placeholder="Enter new password..."
          />
        </div>
        <div>
          <label class="block text-[10px] font-black uppercase text-gray-400 tracking-wider mb-2">Confirm New Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder-gray-400 font-bold transition-all"
            placeholder="Confirm new password..."
          />
        </div>
        <div *ngIf="pwdErrorMessage" class="text-xs font-semibold text-danger">
          {{ pwdErrorMessage }}
        </div>
        <div *ngIf="pwdSuccessMessage" class="text-xs font-semibold text-success">
          {{ pwdSuccessMessage }}
        </div>
      </div>

      <div class="flex items-center space-x-3 justify-end border-t border-gray-100 pt-4">
        <button
          (click)="closeChangePasswordModal()"
          class="px-5 py-2.5 rounded-xl border border-gray-200 text-xs font-bold text-gray-500 hover:bg-gray-50 transition-colors cursor-pointer"
          [disabled]="pwdLoading"
        >
          Cancel
        </button>
        <button
          (click)="submitChangePassword()"
          class="px-5 py-2.5 rounded-xl bg-primary hover:bg-primary-hover shadow-md hover:shadow-lg text-xs font-bold text-white transition-all transform hover:-translate-y-0.5 cursor-pointer"
          [disabled]="pwdLoading"
        >
          <span *ngIf="pwdLoading">Processing...</span>
          <span *ngIf="!pwdLoading">Change Password</span>
        </button>
      </div>
    </div>
  </div>
</div>
